<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>filetransfer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a1a; color: #ccc; font-family: Verdana, Geneva, Tahoma, sans-serif; font-size: 12px; padding: 12px; }
        a { color: #6cf; text-decoration: none; }
        a:hover { text-decoration: underline; }
        h2 { font-size: 11px; font-weight: bold; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="text"], input[type="number"], input[type="password"] { background: #252525; border: 1px solid #444; color: #ddd; font-size: 12px; padding: 4px 6px; width: 100%; font-family: inherit; }
        input:focus-visible { outline: 2px solid #6cf; outline-offset: -2px; border-color: #6cf; }
        button { background: #333; border: 1px solid #555; color: #ccc; font-size: 11px; padding: 4px 12px; cursor: pointer; font-family: inherit; }
        button:hover { background: #444; }
        button:disabled { color: #555; border-color: #333; cursor: default; background: #222; }
        button.danger { color: #e55; border-color: #a33; }
        button.danger:hover { background: #a33; color: #fff; }
        .row { display: flex; gap: 12px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 280px; }
        label { display: block; color: #888; font-size: 11px; margin-bottom: 2px; }
        .field { margin-bottom: 6px; }
        .file-list { border: 1px solid #333; background: #222; max-height: 350px; overflow-y: auto; }
        .file-item { display: flex; align-items: center; padding: 4px 8px; border-bottom: 1px solid #2a2a2a; cursor: pointer; }
        .file-item:hover { background: #2a2a2a; }
        .file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-item .size { color: #777; margin-left: 10px; white-space: nowrap; }
        .file-item .icon { margin-right: 6px; color: #777; font-size: 11px; }
        .checkbox { margin-right: 6px; }
        .btn-row { display: flex; gap: 5px; margin-top: 6px; flex-wrap: wrap; }
        .status-line { padding: 6px 8px; border: 1px solid #333; background: #222; font-size: 11px; margin-top: 6px; color: #aaa; }
        .progress-bar { height: 4px; background: #333; margin: 4px 0; }
        .progress-fill { height: 100%; background: #6cf; }
        .logs { border: 1px solid #333; background: #222; max-height: 150px; overflow-y: auto; padding: 4px 6px; font-size: 11px; }
        .log-entry { padding: 2px 0; border-bottom: 1px solid #2a2a2a; }
        .log-entry .time { color: #555; }
        .log-entry .lvl-I { color: #8a8; }
        .log-entry .lvl-W { color: #da3; }
        .log-entry .lvl-E { color: #e55; }
        .queue-item { display: flex; align-items: center; padding: 4px 8px; border-bottom: 1px solid #2a2a2a; }
        .queue-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .queue-item .meta { color: #777; margin: 0 10px; white-space: nowrap; }
        .queue-item .st { font-size: 10px; padding: 1px 4px; }
        .st-pending { color: #777; }
        .st-transferring { color: #6cf; }
        .st-complete { color: #8a8; }
        .st-failed { color: #e55; }
        .hidden { display: none; }
        .section { border: 1px solid #333; background: #222; padding: 10px; margin-bottom: 10px; }
        .dim { color: #555; }
        .breadcrumb { margin-bottom: 6px; font-size: 12px; min-height: 18px; padding: 2px 0; }
        .breadcrumb a { color: #6cf; }
        noscript { display: block; padding: 20px; text-align: center; color: #e55; background: #222; border: 1px solid #a33; margin-bottom: 10px; font-size: 13px; }
    </style>
</head>
<body>

<noscript>This application requires JavaScript to function. Please enable JavaScript in your browser.</noscript>

<h2 style="font-size:14px; color:#ddd; margin-bottom:10px;">filetransfer</h2>

<div id="main-panel">
    <div class="section">
        <h2>[ ssh ]</h2>
        <div class="row">
            <div class="col"><div class="field"><label for="ssh-host">host</label><input type="text" id="ssh-host"></div></div>
            <div class="col" style="max-width:80px"><div class="field"><label for="ssh-port">port</label><input type="number" id="ssh-port" value="22"></div></div>
            <div class="col"><div class="field"><label for="ssh-user">user</label><input type="text" id="ssh-user"></div></div>
            <div class="col"><div class="field"><label for="ssh-password">password</label><input type="password" id="ssh-password"></div></div>
            <div class="col"><div class="field"><label for="ssh-key">key</label><input type="text" id="ssh-key"></div></div>
        </div>
        <div class="row">
            <div class="col"><div class="field"><label for="path-source">remote path</label><input type="text" id="path-source"></div></div>
            <div class="col"><div class="field"><label for="path-dest">local path</label><input type="text" id="path-dest"></div></div>
        </div>
        <div class="btn-row">
            <button id="btn-save" onclick="saveConfig()">save</button>
            <button id="btn-connect" onclick="connect()">connect</button>
            <button id="btn-disconnect" onclick="disconnect()" disabled>disconnect</button>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <div class="section">
                <h2>[ remote ]</h2>
                <div class="breadcrumb" id="breadcrumb">&nbsp;</div>
                <div class="file-list" id="file-list">
                    <div class="dim" style="padding:10px; text-align:center;">connect to browse</div>
                </div>
                <div class="btn-row">
                    <button id="btn-add" onclick="addSelectedToQueue()" disabled>queue selected</button>
                    <button id="btn-select-all" onclick="selectAll()" disabled>select all</button>
                    <button id="btn-deselect-all" onclick="deselectAll()" disabled>deselect all</button>
                </div>
            </div>
        </div>
        <div class="col">
            <div class="section">
                <h2>[ queue ]</h2>
                <div class="file-list" id="queue-list">
                    <div class="dim" style="padding:10px; text-align:center;">empty</div>
                </div>
                <div class="btn-row">
                    <button id="btn-start" onclick="startTransfer()" disabled>start</button>
                    <button id="btn-pause" onclick="pauseTransfer()" disabled>pause</button>
                    <button id="btn-resume" onclick="resumeTransfer()" disabled>resume</button>
                    <button id="btn-stop" onclick="stopTransfer()" class="danger" disabled>stop</button>
                    <button id="btn-clear-done" onclick="clearCompleted()">clear done</button>
                </div>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>[ status ]</h2>
        <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" id="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div class="status-line" role="status" aria-live="polite">
            <span id="status-dot" style="color:#555;">&#9679;</span>
            <span id="status-text">disconnected</span> &middot;
            speed: <span id="status-speed">0</span> &middot;
            files: <span id="status-files">0/0</span> &middot;
            current: <span id="status-current">-</span>
        </div>
    </div>

    <div class="section">
        <h2>[ log ]</h2>
        <div class="logs" id="logs" role="log" aria-live="polite"></div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
